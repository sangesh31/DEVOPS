trigger:
- main   # make sure your branch name is correct

pr:
- main

pool:
  vmImage: 'ubuntu-latest'   # ⚠️ will fail unless parallelism is enabled

steps:

# 📥 Checkout code from GitHub
- checkout: self

# ☕ Use Java (important fix)
- task: UseJavaVersion@1
  inputs:
    versionSpec: '11'
    architecture: 'x64'

# 📦 Build + Run Regression Tests
- task: Maven@3
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean test'
    options: '-Xmx3072m'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'

# 📊 Publish Results (extra safety)
- task: PublishTestResults@2
  inputs:
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
  condition: succeededOrFailed()